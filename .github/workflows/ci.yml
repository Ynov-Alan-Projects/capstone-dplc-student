name: ci-cd
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test

  build-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/worldcup-app" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/worldcup-app" >> "$GITHUB_ENV"
      - name: helm upgrade over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            cd ~/capstone-dplc-student
            git fetch origin main && git checkout -f main && git reset --hard origin/main
            helm upgrade --install worldcup charts/worldcup \
              --namespace worldcup --create-namespace \
              --set host=worldcup.${{ secrets.PUBLIC_IP }}.nip.io \
              --set image.repository=${{ env.IMAGE }} \
              --set image.tag=${{ github.sha }} \
              --set db.password='${{ secrets.DB_PASSWORD }}' \
              --set ingress.tls.enabled=true \
              --wait --timeout 5m

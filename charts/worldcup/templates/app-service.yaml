apiVersion: v1
kind: Service
metadata:
  name: {{ include "worldcup.name" . }}-app
  labels:
    {{- include "worldcup.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector: {{- include "worldcup.appSelector" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "worldcup.name" . }}-app
  labels: {{- include "worldcup.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels: {{- include "worldcup.appSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "worldcup.labels" . | nindent 8 }}
        {{- include "worldcup.appSelector" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ include "worldcup.name" . }}-app
          readinessProbe:
            httpGet:
              path: /api/health/db
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.app.resources | nindent 12 }}

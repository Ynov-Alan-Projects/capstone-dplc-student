{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "worldcup.name" . }}-dashboard
  labels:
    {{- include "worldcup.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  worldcup.json: |
    {
      "title": "World Cup App",
      "uid": "worldcup-app",
      "schemaVersion": 39,
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "type": "timeseries", "title": "HTTP requests/s",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(rate(http_requests_total[1m]))" }]
        },
        {
          "type": "timeseries", "title": "p95 latency (s)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))" }]
        },
        {
          "type": "timeseries", "title": "App pods (replicas ready)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [{ "expr": "kube_deployment_status_replicas_ready{deployment=\"worldcup-app\"}" }]
        },
        {
          "type": "timeseries", "title": "Container restarts",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [{ "expr": "sum(kube_pod_container_status_restarts_total{pod=~\"worldcup-app.*\"})" }]
        }
      ]
    }
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "worldcup.name" . }}-db
  labels: {{- include "worldcup.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.db.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.password | quote }}
  POSTGRES_DB: {{ .Values.db.name | quote }}
